<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0A0B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="FRETLAB — Guitar Practice System with scales, chords, key detection, and spaced repetition." />
    <title>FRETLAB — Guitar Practice System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>" />
    <link rel="manifest" href="manifest.json" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0A0A0B;
        color: #E8E6E3;
        font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      /* Scrollbar styling */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0A0A0B; }
      ::-webkit-scrollbar-thumb { background: #1a1a1d; border-radius: 2px; }
      /* Range input styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: #1a1a1d;
        border-radius: 2px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #E8453C;
        cursor: pointer;
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #E8453C;
        cursor: pointer;
        border: none;
      }
      /* Pulse animation for recording indicator */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      /* Tap highlight removal for mobile */
      button, a { -webkit-tap-highlight-color: transparent; }
      button { outline: none; }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
